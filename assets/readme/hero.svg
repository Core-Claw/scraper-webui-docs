<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">CoreClaw Documentation</title>
  <desc id="desc">Source for docs.coreclaw.com, built with Astro and Starlight, English plus Simplified Chinese.</desc>
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#F7F2E8" stroke-opacity=".055"/>
    </pattern>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#74E0C1"/><stop offset="1" stop-color="#43B9B0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="390" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1200" height="390" rx="32" fill="#121827"/>
    <rect width="1200" height="390" rx="32" fill="url(#grid)"/>
    <circle cx="1107" cy="56" r="112" fill="#FF7458" fill-opacity=".08"/>
    <circle cx="1048" cy="340" r="138" fill="#63D3BE" fill-opacity=".06"/>

    <g transform="translate(68 48)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <text x="0" y="16" fill="#A9B1C2" font-size="17" font-weight="700" letter-spacing="3">DOCS · ASTRO + STARLIGHT</text>
      <rect x="0" y="34" width="56" height="6" rx="3" fill="#FF7458"/>
      <text x="0" y="132" fill="#F7F2E8" font-size="76" font-weight="780" letter-spacing="-3">coreclaw</text>
      <text x="0" y="206" fill="#F7F2E8" font-size="66" font-weight="760" letter-spacing="-3">documentation</text>
      <rect id="title-highlight" x="0" y="224" width="310" height="18" rx="4" fill="#63D3BE" fill-opacity=".82"/>
      <text x="0" y="278" fill="#D6DCE7" font-size="26" font-weight="520">Source for docs.coreclaw.com.</text>
      <text x="0" y="322" fill="#7F8A9F" font-size="15" font-weight="650" letter-spacing="1.7">EN · 简体中文 · API REFERENCE · STARLIGHT</text>
    </g>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <g transform="translate(800 48) rotate(5 150 96)">
        <rect x="8" y="10" width="300" height="192" rx="20" fill="#080D17" fill-opacity=".38"/>
        <rect width="300" height="192" rx="20" fill="#F7F2E8"/>
        <rect x="22" y="22" width="48" height="8" rx="4" fill="#FF7458"/>
        <text x="22" y="50" fill="#121827" font-size="14" font-weight="760">docs.coreclaw.com</text>
        <rect x="22" y="64" width="120" height="28" rx="8" fill="#182334"/><text x="34" y="83" fill="#F7F2E8" font-size="11" font-weight="700">User Guide</text>
        <rect x="150" y="64" width="120" height="28" rx="8" fill="#182334"/><text x="162" y="83" fill="#F7F2E8" font-size="11" font-weight="700">Developer</text>
        <rect x="22" y="100" width="120" height="28" rx="8" fill="url(#mint)"/><text x="34" y="119" fill="#10313A" font-size="11" font-weight="700">API Reference</text>
        <rect x="150" y="100" width="120" height="28" rx="8" fill="#182334"/><text x="162" y="119" fill="#F7F2E8" font-size="11" font-weight="700">Changelog</text>
        <path d="M22 150h256" stroke="#172033" stroke-opacity=".12" stroke-width="2"/>
        <text x="22" y="170" fill="#7F8A9F" font-size="11" font-weight="650">sidebar: astro.config.mjs · explicit items</text>
      </g>
      <g transform="translate(706 196) rotate(-6 150 70)">
        <rect x="8" y="10" width="300" height="140" rx="18" fill="#080D17" fill-opacity=".4"/>
        <rect width="300" height="140" rx="18" fill="#6A62D9"/>
        <text x="22" y="38" fill="#F7F2E8" font-size="15" font-weight="760">MULTILINGUAL</text>
        <text x="22" y="62" fill="#F7F2E8" fill-opacity=".75" font-size="11">two trees, mirrored</text>
        <rect x="22" y="76" width="120" height="44" rx="10" fill="#F7F2E8" fill-opacity=".16"/>
        <text x="82" y="100" text-anchor="middle" fill="#F7F2E8" font-size="14" font-weight="800">EN</text>
        <text x="82" y="114" text-anchor="middle" fill="#F7F2E8" fill-opacity=".6" font-size="9">/ authoritative</text>
        <rect x="158" y="76" width="120" height="44" rx="10" fill="#F7F2E8" fill-opacity=".16"/>
        <text x="218" y="100" text-anchor="middle" fill="#F7F2E8" font-size="14" font-weight="800">简体中文</text>
        <text x="218" y="114" text-anchor="middle" fill="#F7F2E8" fill-opacity=".6" font-size="9">/zh-cn/</text>
      </g>
    </g>
  </g>
</svg>
