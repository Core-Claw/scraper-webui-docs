name: Deploy Astro Static Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout 私有仓库
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 安装 Node & pnpm 并构建 Astro
      - name: Setup Node and Build
        run: |
          npm install -g pnpm
          pnpm install
          pnpm run build

      # 3. 测试 SSH 连接
      - name: Test SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: 43.173.119.58
          port: 22735
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "SSH connection works!"
            whoami

      # 4. 上传 dist 到服务器
      - name: Deploy dist via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: 43.173.119.58
          port: 22735
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /var/www/scraper-webui-docs
            rsync -av --delete ./dist/ /var/www/scraper-webui-docs/
            echo "Deployment completed: $(date)"
